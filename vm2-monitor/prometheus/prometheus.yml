global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vm1-objetivo'
    static_configs:
      - targets: ['192.168.64.10:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'vm1-objetivo'

  - job_name: 'vm2-monitor'
    static_configs:
      - targets: ['localhost:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'vm2-monitor'
