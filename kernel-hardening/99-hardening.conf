# ■■ Protección de red ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
# # Evitar IP spoofing
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# # No aceptar paquetes con routing de origen
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
# # Ignorar broadcasts (protección contra Smurf attack)
net.ipv4.icmp_echo_ignore_broadcasts = 1
# No responder a ICMP redirect (previene ataques MITM)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
# # Protección contra SYN flood
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
# # Ignorar pings (opcional en producción, útil para reducir superficie)
net.ipv4.icmp_echo_ignore_all = 1
# # Deshabilitar IPv6 si no se usa
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
# # ■■ Protección de memoria y kernel ■■■■■■■■■■■■■■■■■■■■■■■■■■
# # Aleatorización del espacio de direcciones (ASLR)
kernel.randomize_va_space = 2
# # Evitar acceso a punteros del kernel desde userspace
kernel.kptr_restrict = 2
# # Dmesg solo para root
kernel.dmesg_restrict = 1
# # Proteger contra ptrace (debugging de procesos ajenos)
kernel.yama.ptrace_scope = 1
# # Deshabilitar SysRq (teclado mágico — riesgo en entornos físicos)
kernel.sysrq = 0
# # ■■ Sistema de archivos ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
# # Memoria compartida: no ejecutable
# # (ya configurado vía /etc/fstab si seguiste el lab anterior)
fs.suid_dumpable = 0
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
