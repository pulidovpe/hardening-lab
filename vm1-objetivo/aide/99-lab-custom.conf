# Directorios críticos a monitorear con máximo detalle
# Formato: ruta grupo_de_atributos
/etc/ssh CONTENT_EX
/etc/pam.d CONTENT_EX
/etc/sudoers CONTENT_EX
/usr/local/bin CONTENT_EX
/bin CONTENT_EX
/sbin CONTENT_EX
# CONTENT_EX incluye: hash SHA256, permisos, propietario, tamaño, mtime
# Excluir directorios que cambian constantemente
!/var/log
!/tmp
!/run
!/proc
!/sys
!/run
!/var/log/audit
!/var/log/sysstat
!/var/log/journal
