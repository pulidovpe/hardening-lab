server:
    interface: 10.0.0.1
    access-control: 10.0.0.0/24 allow
    access-control: 127.0.0.1/8 allow
    hide-identity: yes
    hide-version: yes
    use-caps-for-id: yes
    forward-zone:
        name: "."
        forward-tls-upstream: yes
        forward-addr: 1.1.1.1@853#cloudflare-dns.com
        forward-addr: 8.8.8.8@853#dns.google
